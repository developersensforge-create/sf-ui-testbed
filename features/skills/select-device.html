<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Select Device — SensForge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; max-width: 375px; margin: 0 auto; min-height: 100vh; }
  .page-label { position: fixed; top: 10px; left: 12px; font-size: 11px; color: #aaa; z-index: 100; }
  .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
  .nav-back { font-size: 22px; color: #f96400; cursor: pointer; text-decoration: none; line-height: 1; padding: 0 4px; }
  .nav-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .nav-spacer { width: 36px; }

  .context-bar { padding: 14px 16px 10px; }
  .context-label { font-size: 12px; color: #999; margin-bottom: 6px; }
  .context-pill {
    display: inline-flex; align-items: center;
    border: 1.5px solid #f96400; border-radius: 20px;
    padding: 5px 12px; font-size: 13px; font-weight: 600; color: #f96400;
    background: #fff3ec;
  }

  .list-section { background: #fff; margin: 0 12px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
  .device-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid #f0f0f0;
    cursor: pointer; transition: background 0.1s;
  }
  .device-row:last-child { border-bottom: none; }
  .device-row.selected { background: #fff3ec; }
  .device-info { flex: 1; }
  .device-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
  .device-sub { font-size: 12px; color: #999; }

  /* Toggle */
  .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; background: #ddd; border-radius: 12px; cursor: pointer; transition: 0.2s;
  }
  .toggle-slider:before {
    content: ''; position: absolute; width: 18px; height: 18px;
    background: #fff; border-radius: 50%; left: 3px; top: 3px; transition: 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: #f96400; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 375px; margin: 0 auto; padding: 12px 16px 24px; background: #f5f5f5; border-top: 1px solid #eee; }
  .next-btn {
    display: block; width: 100%; background: #f96400; color: #fff; border: none;
    border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700;
    cursor: pointer; text-align: center; text-decoration: none;
    transition: opacity 0.2s;
  }
  .next-btn:active { opacity: 0.85; }

  .back-testbed { text-align: center; padding: 10px 0 80px; }
  .back-testbed a { font-size: 12px; color: #aaa; text-decoration: none; }

    /* ===== Comment & Improve Section ===== */
    .page-bottom-section {
      max-width: 375px; margin: 0 auto;
      padding: 0 0 40px;
    }
    .divider-line { border: none; border-top: 1px solid #eee; margin: 24px 16px 20px; }

    .comment-section { padding: 0 16px; }
    .comment-section-title { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }

    .comment-textarea {
      width: 100%; border: 1.5px solid #eee; border-radius: 10px;
      padding: 10px 12px; font-size: 14px; color: #1a1a1a;
      font-family: inherit; outline: none; resize: vertical;
      min-height: 70px; background: #fafafa; transition: border-color 0.2s;
    }
    .comment-textarea:focus { border-color: #f96400; background: #fff; }

    .comment-add-btn {
      display: inline-block; margin-top: 8px;
      background: #f96400; color: #fff; border: none; border-radius: 8px;
      padding: 9px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .comment-add-btn:active { opacity: 0.85; }

    .comments-list { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
    .comment-item {
      background: #fff; border: 1px solid #eee; border-radius: 10px;
      padding: 12px 14px; position: relative;
    }
    .comment-text { font-size: 14px; color: #1a1a1a; line-height: 1.5; margin-bottom: 4px; }
    .comment-meta { font-size: 11px; color: #aaa; }
    .comment-delete {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; font-size: 16px; cursor: pointer; color: #ccc;
    }
    .comment-delete:hover { color: #ff4466; }

    .improve-section { padding: 16px 16px 0; }
    .improve-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff; border: 1.5px solid #f96400; border-radius: 10px;
      color: #f96400; font-size: 14px; font-weight: 600; padding: 10px 20px;
      cursor: pointer; transition: background 0.15s;
    }
    .improve-btn:hover { background: #fff3ec; }

    .improve-form {
      display: none; margin-top: 12px;
      border: 1.5px solid #eee; border-radius: 10px; padding: 14px;
      background: #fafafa;
    }
    .improve-textarea {
      width: 100%; border: 1.5px solid #eee; border-radius: 8px;
      padding: 10px 12px; font-size: 14px; color: #1a1a1a;
      font-family: inherit; outline: none; resize: vertical;
      min-height: 70px; background: #fff; transition: border-color 0.2s;
      margin-bottom: 8px;
    }
    .improve-textarea:focus { border-color: #f96400; }
    .improve-submit-btn {
      background: #f96400; color: #fff; border: none; border-radius: 8px;
      padding: 9px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    }

    /* Toast for skills pages */
    .page-toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #0f1b2d; color: #fff; padding: 12px 20px;
      border-radius: 10px; font-size: 13px; font-weight: 600;
      box-shadow: 0 6px 24px rgba(0,0,0,0.3); border-left: 3px solid #f96400;
      z-index: 3000; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0; white-space: nowrap;
    }
    .page-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  </style>
</head>
<body>

<span class="page-label">P4</span>

<div class="top-nav">
  <a class="nav-back" onclick="history.back()" href="#">‹</a>
  <span class="nav-title">Select Device</span>
  <div class="nav-spacer"></div>
</div>

<div class="context-bar">
  <div class="context-label">Trigger context</div>
  <span class="context-pill" id="contextPill">If …</span>
</div>

<div class="list-section" id="deviceList">
  <div class="device-row" data-device="Living Room Cam" onclick="selectDevice(this)">
    <div class="device-info">
      <div class="device-name">Living Room Cam</div>
      <div class="device-sub">Active since 01/09/2021</div>
    </div>
    <label class="toggle" onclick="event.stopPropagation()">
      <input type="checkbox" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="device-row" data-device="Basement Cam" onclick="selectDevice(this)">
    <div class="device-info">
      <div class="device-name">Basement Cam</div>
      <div class="device-sub">Active since 08/20/2021</div>
    </div>
    <label class="toggle" onclick="event.stopPropagation()">
      <input type="checkbox">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="device-row" data-device="Garage V2" onclick="selectDevice(this)">
    <div class="device-info">
      <div class="device-name">Garage V2</div>
      <div class="device-sub">Active since 06/17/2021</div>
    </div>
    <label class="toggle" onclick="event.stopPropagation()">
      <input type="checkbox">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="device-row" data-device="FrontYard-Sentinel-01" onclick="selectDevice(this)">
    <div class="device-info">
      <div class="device-name">FrontYard-Sentinel-01</div>
      <div class="device-sub"></div>
    </div>
    <label class="toggle" onclick="event.stopPropagation()">
      <input type="checkbox">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="device-row" data-device="LivingRoom-Watch-02" onclick="selectDevice(this)">
    <div class="device-info">
      <div class="device-name">LivingRoom-Watch-02</div>
      <div class="device-sub"></div>
    </div>
    <label class="toggle" onclick="event.stopPropagation()">
      <input type="checkbox">
      <span class="toggle-slider"></span>
    </label>
  </div>
</div>

<div class="back-testbed"><a href="../../index.html">← Back to Testbed</a></div>

<div class="bottom-bar">
  <a class="next-btn" id="nextBtn" href="#">Next →</a>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const trigger = params.get('trigger') || '';
  const condition = params.get('condition') || '';

  if (trigger) {
    document.getElementById('contextPill').textContent = 'If ' + trigger;
  }

  // Default: Living Room Cam is pre-selected (toggle is ON by default)
  let selectedDevice = 'Living Room Cam';
  const btn = document.getElementById('nextBtn');

  function updateBtn() {
    btn.href = 'select-action.html?trigger=' + encodeURIComponent(trigger) +
               '&device=' + encodeURIComponent(selectedDevice) +
               (condition ? '&condition=' + encodeURIComponent(condition) : '');
  }

  // Always enabled — Living Room Cam pre-selected
  updateBtn();

  window.selectDevice = function(row) {
    document.querySelectorAll('.device-row').forEach(r => r.classList.remove('selected'));
    row.classList.add('selected');
    selectedDevice = row.dataset.device;
    updateBtn();
  };
})();
</script>

<!-- ===== Comments + Improve Section ===== -->
<div class="page-bottom-section">
  <hr class="divider-line" />

  <div class="comment-section">
    <div class="comment-section-title">💬 Leave a comment on this page</div>
    <textarea class="comment-textarea" id="commentInput" placeholder="What do you think about this page?"></textarea>
    <br />
    <button class="comment-add-btn" onclick="addComment()">Add Comment</button>
    <div class="comments-list" id="commentsList"></div>
  </div>

  <div class="improve-section" style="margin-top:20px;">
    <button class="improve-btn" onclick="toggleImproveForm()">🔄 Improve This Page</button>
    <div class="improve-form" id="improveForm">
      <textarea class="improve-textarea" id="improveFeedback" placeholder="What should be improved?"></textarea>
      <button class="improve-submit-btn" onclick="submitImprove()">Submit →</button>
    </div>
  </div>
</div>

<div class="page-toast" id="pageToast"></div>

<script>
(function() {
  const PAGE_ID = 'p4';
  const PAGE_NUM = 'P4';
  const PAGE_TITLE = 'Select Device';
  const WEBHOOK = 'https://discord.com/api/webhooks/1488974369911996528/IKxfq6IL__bjiM6EtkNaTw5cFGup3rAVa8IlWiu1g4cEMShKMiILUlE06lcYPpGLS1Ey';

  // ===== Comment system =====
  function loadComments() {
    const list = document.getElementById('commentsList');
    if (!list) return;
    list.innerHTML = '';
    const keys = Object.keys(localStorage).filter(k => k.startsWith('comments_' + PAGE_ID + '_')).sort();
    keys.forEach(function(key) {
      const data = JSON.parse(localStorage.getItem(key) || '{}');
      if (!data.text) return;
      const item = document.createElement('div');
      item.className = 'comment-item';
      item.innerHTML = '<div class="comment-text">' + escHtml(data.text) + '</div>' +
        '<div class="comment-meta">' + data.time + '</div>' +
        '<button class="comment-delete" onclick="deleteComment('' + key + '')" title="Delete">🗑️</button>';
      list.appendChild(item);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  window.addComment = function() {
    const ta = document.getElementById('commentInput');
    const text = ta.value.trim();
    if (!text) { showPageToast('Please write a comment first.', true); return; }
    const key = 'comments_' + PAGE_ID + '_' + Date.now();
    const now = new Date().toLocaleString();
    localStorage.setItem(key, JSON.stringify({ text: text, time: now }));
    ta.value = '';
    loadComments();
    showPageToast('Comment saved!');
  };

  window.deleteComment = function(key) {
    localStorage.removeItem(key);
    loadComments();
  };

  // ===== Improve form =====
  window.toggleImproveForm = function() {
    const form = document.getElementById('improveForm');
    form.style.display = form.style.display === 'block' ? 'none' : 'block';
    if (form.style.display === 'block') {
      document.getElementById('improveFeedback').focus();
    }
  };

  window.submitImprove = async function() {
    const feedback = document.getElementById('improveFeedback').value.trim();
    if (!feedback) { showPageToast('Please describe what should be improved.', true); return; }
    const msg = '🔄 **Improve Request**\nFeature: Camera Skills\nPage: ' + PAGE_NUM + ' - ' + PAGE_TITLE + '\nFeedback: ' + feedback;
    try {
      await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: msg })
      });
    } catch(e) {}
    // Set dashboard card back to building state
    localStorage.setItem('feature-state-camera-skills', 'building');
    localStorage.setItem('feature-state-camera-skills-start', Date.now().toString());
    document.getElementById('improveForm').style.display = 'none';
    document.getElementById('improveFeedback').value = '';
    showPageToast('Improvement request sent! Claire will revise this page.');
  };

  // ===== Toast =====
  window.showPageToast = function(msg, isError) {
    const toast = document.getElementById('pageToast');
    toast.textContent = msg;
    toast.style.borderLeftColor = isError ? '#ff4466' : '#f96400';
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 3500);
  };

  loadComments();
})();
</script>

</body>
</html>
