<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Add Conditions — SensForge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; max-width: 375px; margin: 0 auto; min-height: 100vh; }
  .page-label { position: fixed; top: 10px; left: 12px; font-size: 11px; color: #aaa; z-index: 100; }
  .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
  .nav-back { font-size: 22px; color: #f96400; cursor: pointer; text-decoration: none; line-height: 1; padding: 0 4px; }
  .nav-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .nav-spacer { width: 36px; }

  .content { padding: 16px; }

  .trigger-context { margin-bottom: 20px; }
  .context-label { font-size: 12px; color: #999; margin-bottom: 8px; }
  .trigger-pill {
    display: inline-flex; align-items: center; gap: 6px;
    border: 2px solid #f96400; border-radius: 20px;
    padding: 6px 14px; font-size: 14px; font-weight: 600; color: #f96400;
    background: #fff3ec;
  }

  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #eee; }
  .card-label { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 10px; }

  .condition-input {
    width: 100%; border: 1.5px solid #eee; border-radius: 8px;
    padding: 11px 12px; font-size: 14px; color: #1a1a1a;
    font-family: inherit; outline: none; transition: border-color 0.2s;
    background: #fafafa;
  }
  .condition-input:focus { border-color: #f96400; background: #fff; }

  .suggestions-label { font-size: 12px; color: #999; margin-bottom: 10px; margin-top: 16px; }
  .pills-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .suggestion-pill {
    border: 1.5px solid #f96400; border-radius: 16px;
    padding: 6px 12px; font-size: 13px; color: #f96400;
    background: #fff; cursor: pointer; transition: background 0.15s;
    user-select: none;
  }
  .suggestion-pill:active, .suggestion-pill.active { background: #fff3ec; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 375px; margin: 0 auto; padding: 12px 16px 24px; background: #f5f5f5; border-top: 1px solid #eee; }
  .done-btn {
    display: block; width: 100%; background: #f96400; color: #fff; border: none;
    border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700;
    cursor: pointer; text-align: center; text-decoration: none;
  }
  .done-btn:active { opacity: 0.85; }

  .back-testbed { text-align: center; padding: 8px 0 80px; }
  .back-testbed a { font-size: 12px; color: #aaa; text-decoration: none; }
</style>
</head>
<body>

<span class="page-label">P3</span>

<div class="top-nav">
  <a class="nav-back" onclick="history.back()" href="#">‹</a>
  <span class="nav-title">Add Conditions</span>
  <div class="nav-spacer"></div>
</div>

<div class="content">
  <div class="trigger-context">
    <div class="context-label">Selected trigger</div>
    <span class="trigger-pill" id="triggerPill">—</span>
  </div>

  <div class="card">
    <div class="card-label">Additional condition (optional)</div>
    <input type="text" class="condition-input" id="conditionInput" placeholder="Type additional condition here...">

    <div class="suggestions-label" id="suggestionsLabel" style="display:none;">Quick add</div>
    <div class="pills-row" id="pillsRow"></div>
  </div>
</div>

<div class="back-testbed"><a href="../../index.html">← Back to Testbed</a></div>

<div class="bottom-bar">
  <a class="done-btn" id="doneBtn" href="#">Done →</a>
</div>

<script>
(function() {
  const triggerSuggestions = {
    "Person Detected": ["Unknown person", "My kids", "A family member name"],
    "Person Coming Home": ["My kids", "A family member name"],
    "Person Near Car or Driveway": ["At night", "Stay too long"],
    "Motion Detected": ["In my backyard", "At night"],
    "Vehicle Detected": ["On my driveway", "Unknown Vehicle"],
    "Package Delivered": ["On my frontdoor", "On my driveway"],
    "Package Taken": ["By Family Member", "By Unknown Person", "Away from home"],
    "Familiar Face Detected": [],
    "Pet Behavior": ["Playing Toilet Paper", "Getting in Couch"],
    "Unusual Sound Detected": ["Dog Bark too long", "Kids Cry too long"],
    "Fall Detected": ["Elder People", "A family member name"],
    "Fall Detected (Elder)": ["Elder People", "A family member name"]
  };

  const params = new URLSearchParams(window.location.search);
  const trigger = params.get('trigger') || 'Unknown Trigger';

  document.getElementById('triggerPill').textContent = trigger;

  // Find suggestions (case-insensitive match)
  const triggerKey = Object.keys(triggerSuggestions).find(
    k => k.toLowerCase() === trigger.toLowerCase()
  );
  const suggestions = triggerKey !== undefined ? triggerSuggestions[triggerKey] : null;

  const pillsRow = document.getElementById('pillsRow');
  const suggestionsLabel = document.getElementById('suggestionsLabel');

  if (suggestions && suggestions.length > 0) {
    suggestionsLabel.style.display = 'block';
    suggestions.forEach(function(text) {
      const pill = document.createElement('span');
      pill.className = 'suggestion-pill';
      pill.textContent = text;
      pill.onclick = function() { fillSuggestion(pill, text); };
      pillsRow.appendChild(pill);
    });
  }

  // Update done button href dynamically based on input
  function updateDoneBtn() {
    const condition = document.getElementById('conditionInput').value.trim();
    let href = 'index.html?trigger=' + encodeURIComponent(trigger);
    if (condition) {
      href += '&condition=' + encodeURIComponent(condition);
    }
    document.getElementById('doneBtn').href = href;
  }

  document.getElementById('conditionInput').addEventListener('input', updateDoneBtn);
  updateDoneBtn();

  window.fillSuggestion = function(el, text) {
    // Toggle active state
    const wasActive = el.classList.contains('active');
    document.querySelectorAll('.suggestion-pill').forEach(p => p.classList.remove('active'));
    const input = document.getElementById('conditionInput');
    if (!wasActive) {
      el.classList.add('active');
      input.value = text;
    } else {
      input.value = '';
    }
    updateDoneBtn();
  };
})();
</script>
</body>
</html>
