<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Select a Trigger — SensForge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 100vh;
    background: #f5f5f5;
    position: relative;
    overflow: hidden;
  }

  /* Background page (dimmed My Skills) */
  .bg-page {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #f5f5f5;
    pointer-events: none;
  }

  .status-bar {
    background: #fff;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    font-size: 12px;
    font-weight: 600;
  }
  .nav-header {
    background: #fff;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-bottom: 1px solid #ebebeb;
  }
  .nav-header .back-btn {
    position: absolute;
    left: 16px;
    font-size: 22px;
    color: #1a1a1a;
    text-decoration: none;
  }
  .nav-header h1 {
    font-size: 18px;
    font-weight: 700;
  }

  .testbed-link {
    display: block;
    text-align: center;
    padding: 8px;
    font-size: 12px;
    color: #f96400;
    text-decoration: none;
    background: #fff;
    border-bottom: 1px solid #ebebeb;
  }

  /* Dimmed background content */
  .bg-content {
    padding: 12px 0;
    opacity: 0.35;
    filter: blur(1px);
    pointer-events: none;
  }
  .bg-section {
    background: #fff;
    margin-bottom: 12px;
    padding: 14px 16px;
  }
  .bg-section .bg-row {
    height: 14px;
    background: #e0e0e0;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .bg-section .bg-row.short { width: 60%; }
  .bg-section .bg-row.medium { width: 80%; }

  /* Dim overlay */
  .dim-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    pointer-events: none;
  }

  /* Bottom sheet */
  .bottom-sheet {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding-bottom: 34px;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: #ddd;
    border-radius: 2px;
    margin: 10px auto 0;
  }

  .sheet-header {
    padding: 14px 20px 10px;
    border-bottom: 1px solid #f0f0f0;
  }
  .sheet-header .sheet-label {
    font-size: 13px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sheet-header .sheet-title {
    font-size: 17px;
    font-weight: 700;
    color: #1a1a1a;
    margin-top: 2px;
  }

  /* Trigger list */
  .trigger-list {
    list-style: none;
  }
  .trigger-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
    border-bottom: 1px solid #f5f5f5;
    cursor: pointer;
    font-size: 15px;
    color: #1a1a1a;
  }
  .trigger-item:last-child { border-bottom: none; }
  .trigger-item:active { background: #fef6f0; }

  .radio-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #e0e0e0;
    background: #fff;
    flex-shrink: 0;
  }
  .radio-dot.selected {
    border-color: #f96400;
    background: #f96400;
    box-shadow: inset 0 0 0 4px #fff;
  }

  .sheet-footer {
    padding: 12px 20px 0;
  }
  .btn-orange {
    display: block;
    width: 100%;
    background: #f96400;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
  }
  .btn-orange:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="phone">
  <!-- Background page -->
  <div class="bg-page">
    <div class="status-bar">
      <span>9:41</span>
      <span>●●●</span>
    </div>
    <div class="nav-header">
      <h1>My Skills</h1>
    </div>
    <div class="testbed-link" style="pointer-events:none;">← Back to Testbed</div>
    <div class="bg-content">
      <div class="bg-section">
        <div class="bg-row short"></div>
        <div class="bg-row medium"></div>
        <div class="bg-row"></div>
        <div class="bg-row short"></div>
      </div>
      <div class="bg-section">
        <div class="bg-row short"></div>
        <div class="bg-row medium"></div>
        <div class="bg-row"></div>
      </div>
    </div>
  </div>

  <!-- Dim overlay -->
  <div class="dim-overlay"></div>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-label">New Skill Template</div>
      <div class="sheet-title">Select a Trigger</div>
    </div>

    <ul class="trigger-list">
      <li class="trigger-item">
        <span>Person Detected</span>
        <div class="radio-dot selected"></div>
      </li>
      <li class="trigger-item">
        <span>Person Coming Home</span>
        <div class="radio-dot"></div>
      </li>
      <li class="trigger-item">
        <span>Person Near Car or Driveway</span>
        <div class="radio-dot"></div>
      </li>
      <li class="trigger-item">
        <span>Motion Detected</span>
        <div class="radio-dot"></div>
      </li>
      <li class="trigger-item">
        <span>Vehicle Detected</span>
        <div class="radio-dot"></div>
      </li>
      <li class="trigger-item">
        <span>Package Delivered</span>
        <div class="radio-dot"></div>
      </li>
    </ul>

    <div class="sheet-footer">
      <a href="configure-skill.html" class="btn-orange">Save</a>
    </div>
  </div>
</div>
</body>
</html>
