<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NextSport APK Download</title>
<style>
body { font-family: -apple-system, sans-serif; background: #0a0f1e; color: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
.btn { background: #f97316; color: #fff; border: none; border-radius: 14px;
  padding: 16px 32px; font-size: 18px; font-weight: 800; cursor: pointer;
  text-decoration: none; display: inline-block; margin-top: 20px; }
.sub { color: #6b7280; font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>
<div style="font-size:48px;">📱</div>
<h1 style="font-size:24px; margin:16px 0 8px;">NextSport APK</h1>
<p id="status">Preparing download...</p>
<div id="btn-area"></div>

<script>
const BUILD = new URLSearchParams(location.search).get('build') || 'nextsport-build13.apk';
const URL = 'https://kpahmlhkvmasyobwrewy.supabase.co/storage/v1/object/public/apk-builds/' + BUILD;

document.getElementById('status').textContent = 'Build: ' + BUILD;

// Create direct download link
const a = document.createElement('a');
a.href = URL;
a.download = BUILD;
a.className = 'btn';
a.textContent = '📥 Download APK';
document.getElementById('btn-area').appendChild(a);

// Also show manual link
const p = document.createElement('p');
p.className = 'sub';
p.textContent = 'Tap the button above. If it does not work, long-press → Save link.';
document.body.appendChild(p);
</script>
</body>
</html>
