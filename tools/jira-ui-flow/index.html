<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira → UI Flow Dashboard · SensForge</title>
  <style>
    /* ── Reset & Base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange:      #f96400;
      --orange-lt:   #fff0e6;
      --orange-dk:   #c94f00;
      --green:       #1a9c4e;
      --green-lt:    #e6f7ee;
      --green-dk:    #0f6b34;
      --blue:        #1a6bc9;
      --blue-lt:     #e6f0fb;
      --yellow:      #b87a00;
      --yellow-lt:   #fff8e1;
      --red:         #c0392b;
      --red-lt:      #fdecea;
      --grey:        #6b7280;
      --grey-lt:     #f3f4f6;
      --grey-dk:     #374151;
      --border:      #e5e7eb;
      --text:        #111827;
      --text-muted:  #6b7280;
      --bg:          #f9fafb;
      --white:       #ffffff;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-lg:   0 10px 25px rgba(0,0,0,.12), 0 4px 10px rgba(0,0,0,.08);
      --radius:      8px;
      --radius-lg:   12px;
    }
    html { font-size: 15px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      background: var(--white);
      border-bottom: 2px solid var(--orange);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      width: 32px; height: 32px;
      background: var(--orange);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: 14px;
      letter-spacing: -0.5px;
    }
    .header-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .header-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .header-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: right;
    }

    /* ── Main Layout ─────────────────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ── Stats Bar ───────────────────────────────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-align: center;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .stat-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .stat-card.active { border-color: var(--orange); background: var(--orange-lt); }
    .stat-number {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--orange);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-top: 4px;
    }

    /* ── Filter Tabs ─────────────────────────────────────────────────── */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-tab:hover { border-color: var(--orange); color: var(--orange); }
    .filter-tab.active {
      background: var(--orange);
      border-color: var(--orange);
      color: var(--white);
    }

    /* ── Refresh notice ──────────────────────────────────────────────── */
    .refresh-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 14px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .refresh-btn {
      padding: 4px 10px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color .15s;
    }
    .refresh-btn:hover { border-color: var(--orange); color: var(--orange); }

    /* ── Table ───────────────────────────────────────────────────────── */
    .table-wrap {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead tr {
      background: var(--grey-lt);
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    td {
      padding: 12px 14px;
      vertical-align: middle;
    }
    .ticket-key a {
      font-weight: 700;
      color: var(--orange);
      text-decoration: none;
      font-size: 0.82rem;
    }
    .ticket-key a:hover { text-decoration: underline; }
    .ticket-summary {
      color: var(--text);
      max-width: 260px;
      line-height: 1.4;
    }

    /* ── Badges ──────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-yellow    { background: var(--yellow-lt); color: var(--yellow); border: 1px solid #f5d78e; }
    .badge-blue      { background: var(--blue-lt);   color: var(--blue);   border: 1px solid #93c5fd; }
    .badge-green     { background: var(--green-lt);  color: var(--green);  border: 1px solid #6ee7a0; }
    .badge-darkgreen { background: #d1fae5;           color: var(--green-dk); border: 1px solid #34d399; }
    .badge-grey      { background: var(--grey-lt);   color: var(--grey);   border: 1px solid #d1d5db; }
    .badge-red       { background: var(--red-lt);    color: var(--red);    border: 1px solid #fca5a5; }
    .badge-orange    { background: var(--orange-lt); color: var(--orange); border: 1px solid #fdba74; }

    .severity-blocker { background: var(--red-lt);    color: var(--red);    border: 1px solid #fca5a5; }
    .severity-major   { background: var(--orange-lt); color: var(--orange); border: 1px solid #fdba74; }
    .severity-minor   { background: var(--yellow-lt); color: var(--yellow); border: 1px solid #f5d78e; }

    /* ── Action Buttons ──────────────────────────────────────────────── */
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
      white-space: nowrap;
      background: none;
    }
    .btn-approve  { background: var(--green-lt);  color: var(--green);   border-color: #6ee7a0; }
    .btn-approve:hover  { background: var(--green); color: white; border-color: var(--green); }
    .btn-approve.active { background: var(--green); color: white; border-color: var(--green); }
    .btn-ignore   { background: var(--grey-lt);   color: var(--grey);    border-color: #d1d5db; }
    .btn-ignore:hover   { background: var(--grey); color: white; border-color: var(--grey); }
    .btn-ignore.active  { background: var(--grey-dk); color: white; border-color: var(--grey-dk); }
    .btn-issues   { background: var(--red-lt);    color: var(--red);     border-color: #fca5a5; }
    .btn-issues:hover   { background: var(--red); color: white; border-color: var(--red); }
    .btn-brief    { background: var(--blue-lt);   color: var(--blue);    border-color: #93c5fd; }
    .btn-brief:hover    { background: var(--blue); color: white; border-color: var(--blue); }

    /* ── Expanded Row Panels ─────────────────────────────────────────── */
    .expand-row td { padding: 0; }
    .expand-panel {
      padding: 16px 20px;
      background: #fafbfc;
      border-top: 1px solid var(--border);
    }
    .expand-panel.hidden { display: none; }
    .expand-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* Issues list */
    .issues-list { display: flex; flex-direction: column; gap: 8px; }
    .issue-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.82rem;
    }
    .issue-frame {
      font-weight: 600;
      color: var(--text);
    }
    .issue-desc {
      color: var(--text-muted);
      margin-top: 2px;
      font-size: 0.79rem;
    }
    .no-issues {
      color: var(--green);
      font-size: 0.82rem;
      padding: 6px 0;
    }

    /* ── Brief Modal ─────────────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 680px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: modal-in .2s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)  translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .modal-header-text {}
    .modal-ticket-key {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
    }
    .modal-close {
      background: var(--grey-lt);
      border: none;
      border-radius: 6px;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }
    .modal-body {
      overflow-y: auto;
      padding: 20px 22px;
      flex: 1;
    }

    /* Brief content styling */
    .brief-content { font-size: 0.875rem; line-height: 1.7; color: var(--text); }
    .brief-content h1 {
      font-size: 1.15rem; font-weight: 800; color: var(--text);
      margin-bottom: 4px; padding-bottom: 8px;
      border-bottom: 2px solid var(--orange);
    }
    .brief-content h2 {
      font-size: 0.95rem; font-weight: 700; color: var(--text);
      margin: 18px 0 6px;
    }
    .brief-content h3 {
      font-size: 0.85rem; font-weight: 700; color: var(--text);
      margin: 14px 0 4px;
    }
    .brief-content p { margin: 8px 0; }
    .brief-content strong { font-weight: 700; }
    .brief-content em { font-style: italic; }
    .brief-content hr {
      border: none; border-top: 1px solid var(--border);
      margin: 14px 0;
    }
    .brief-content ul, .brief-content ol {
      margin: 8px 0 8px 18px;
    }
    .brief-content li { margin: 4px 0; }
    .brief-content code {
      background: var(--grey-lt);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.82em;
    }
    /* Checkbox-style list items (- [ ]) */
    .brief-checklist { list-style: none; margin-left: 0; }
    .brief-checklist li {
      display: flex; align-items: flex-start; gap: 8px; margin: 5px 0;
    }
    .brief-checklist li::before {
      content: '☐';
      color: var(--text-muted);
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Notification Banner ─────────────────────────────────────────── */
    .notif {
      position: fixed;
      bottom: 20px; right: 20px;
      background: var(--grey-dk);
      color: white;
      padding: 10px 16px;
      border-radius: var(--radius);
      font-size: 0.82rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 300;
      display: none;
      align-items: center;
      gap: 8px;
      max-width: 320px;
      animation: notif-in .2s ease;
    }
    @keyframes notif-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .notif.show { display: flex; }
    .notif-icon { font-size: 1rem; }

    /* ── Empty State ─────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state-text { font-size: 0.9rem; }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .header { padding: 12px 14px; }
      .container { padding: 16px 10px; }
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
      th.hide-sm, td.hide-sm { display: none; }
      .ticket-summary { max-width: 160px; }
      .actions { flex-direction: column; }
      .modal { max-height: 95vh; }
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo">SF</div>
    <div>
      <div class="header-title">Jira → UI Flow</div>
      <div class="header-subtitle">Design pipeline dashboard</div>
    </div>
  </div>
  <div class="header-meta">
    Auto-refreshes every 60s<br>
    <span id="last-updated">Loading…</span>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────────────────────────── -->
<main class="container">

  <!-- Stats Bar -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-card" data-filter="all">
      <div class="stat-number" id="stat-total">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card" data-filter="needs-attention">
      <div class="stat-number" id="stat-attention">—</div>
      <div class="stat-label">Needs Attention</div>
    </div>
    <div class="stat-card" data-filter="in-qa">
      <div class="stat-number" id="stat-qa">—</div>
      <div class="stat-label">In QA</div>
    </div>
    <div class="stat-card" data-filter="ready">
      <div class="stat-number" id="stat-ready">—</div>
      <div class="stat-label">Ready for Review</div>
    </div>
    <div class="stat-card" data-filter="approved">
      <div class="stat-number" id="stat-approved">—</div>
      <div class="stat-label">Approved</div>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="needs-attention">⚠️ Needs Attention</button>
    <button class="filter-tab" data-filter="ready">✅ Ready for Review</button>
    <button class="filter-tab" data-filter="approved">🏆 Approved</button>
    <button class="filter-tab" data-filter="ignored">⚫ Ignored</button>
  </div>

  <!-- Refresh Bar -->
  <div class="refresh-bar">
    <span id="ticket-count-label">Loading tickets…</span>
    <button class="refresh-btn" id="refresh-btn">↻ Refresh now</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="ticket-table">
      <thead>
        <tr>
          <th>Ticket</th>
          <th>Summary</th>
          <th>Status</th>
          <th class="hide-sm">Brief</th>
          <th class="hide-sm">Figma Checks</th>
          <th>Quality</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="ticket-tbody">
        <tr>
          <td colspan="7">
            <div class="empty-state">
              <div class="empty-state-icon">⏳</div>
              <div class="empty-state-text">Loading…</div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<!-- ── Brief Modal ─────────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="brief-modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-text">
        <div class="modal-ticket-key" id="modal-ticket-key"></div>
        <div class="modal-title" id="modal-ticket-title"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="brief-content" id="modal-brief-body"></div>
    </div>
  </div>
</div>

<!-- ── Toast notification ──────────────────────────────────────────────── -->
<div class="notif" id="notif">
  <span class="notif-icon" id="notif-icon">✓</span>
  <span id="notif-text"></span>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  State & overrides
// ═══════════════════════════════════════════════════════════════════════
const JIRA_BASE   = 'https://sensforge.atlassian.net/browse/';
const LS_KEY      = 'jira-ui-flow-overrides';
const REFRESH_MS  = 60_000;

let allTickets   = {};
let activeFilter = 'all';
let expandedRows = {}; // key → 'issues' | 'brief' | null
let refreshTimer = null;

function loadOverrides() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
  catch { return {}; }
}
function saveOverride(key, patch) {
  const ov = loadOverrides();
  ov[key] = { ...(ov[key] || {}), ...patch };
  localStorage.setItem(LS_KEY, JSON.stringify(ov));
}

function mergeTickets(state, overrides) {
  const result = {};
  for (const [k, v] of Object.entries(state)) {
    result[k] = { ...v, ...(overrides[k] || {}) };
  }
  return result;
}

// ═══════════════════════════════════════════════════════════════════════
//  Data loading
// ═══════════════════════════════════════════════════════════════════════
async function fetchState() {
  const r = await fetch('state.json?_=' + Date.now());
  if (!r.ok) throw new Error('state.json fetch failed: ' + r.status);
  return r.json();
}

async function reload() {
  try {
    const raw       = await fetchState();
    const overrides = loadOverrides();
    allTickets      = mergeTickets(raw, overrides);

    // Last updated = newest last_check_at or brief_sent_at
    const dates = Object.values(raw)
      .flatMap(t => [t.last_check_at, t.brief_sent_at].filter(Boolean))
      .map(d => new Date(d)).filter(d => !isNaN(d));
    const latest = dates.length ? new Date(Math.max(...dates)) : null;
    document.getElementById('last-updated').textContent =
      latest ? 'Last updated: ' + fmtDate(latest) : 'Last updated: unknown';

    render();
  } catch (e) {
    console.error(e);
    showToast('⚠️ Failed to load state.json — showing cached data', 4000);
  }
}

function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => { reload().then(scheduleRefresh); }, REFRESH_MS);
}

// ═══════════════════════════════════════════════════════════════════════
//  Derived status
// ═══════════════════════════════════════════════════════════════════════
function effectiveStatus(t) {
  if (t.ignored)        return 'ignored';
  if (t.human_approved) return 'approved';
  const raw = (t.status || '').trim().toUpperCase();
  if (raw === 'READY FOR REVIEW' || raw === 'READY_FOR_REVIEW') return 'ready';
  if (raw === 'IN QA' || raw === 'QA') return 'in-qa';
  if (raw === 'UI DESIGN' || raw === 'UI_DESIGN') return 'ui-design';
  return 'ui-design';
}

function matchesFilter(t, filter) {
  const s = effectiveStatus(t);
  if (filter === 'all')             return true;
  if (filter === 'ignored')         return s === 'ignored';
  if (filter === 'approved')        return s === 'approved';
  if (filter === 'ready')           return s === 'ready';
  if (filter === 'in-qa')           return s === 'in-qa';
  if (filter === 'needs-attention') {
    // has open blockers OR no figma URL OR quality failed and not approved/ignored
    const open = !t.human_approved && !t.ignored;
    const hasBlocker = (t.issues || []).some(i => i.severity === 'blocker');
    return open && (hasBlocker || !t.figma_url || (t.figma_check_count > 0 && !t.quality_passed));
  }
  return true;
}

// ═══════════════════════════════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════════════════════════════
function render() {
  renderStats();
  renderTable();
}

function renderStats() {
  const all   = Object.values(allTickets);
  document.getElementById('stat-total').textContent    = all.length;
  document.getElementById('stat-attention').textContent = all.filter(t => matchesFilter(t,'needs-attention')).length;
  document.getElementById('stat-qa').textContent        = all.filter(t => effectiveStatus(t)==='in-qa').length;
  document.getElementById('stat-ready').textContent     = all.filter(t => effectiveStatus(t)==='ready').length;
  document.getElementById('stat-approved').textContent  = all.filter(t => effectiveStatus(t)==='approved').length;
}

function renderTable() {
  const tickets = Object.values(allTickets).filter(t => matchesFilter(t, activeFilter));
  const tbody = document.getElementById('ticket-tbody');
  document.getElementById('ticket-count-label').textContent =
    tickets.length + ' ticket' + (tickets.length !== 1 ? 's' : '') + ' shown';

  if (!tickets.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
      <div class="empty-state-icon">🎉</div>
      <div class="empty-state-text">No tickets match this filter.</div>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = '';
  for (const t of tickets) {
    tbody.appendChild(buildMainRow(t));
    tbody.appendChild(buildExpandRow(t));
  }
}

function buildMainRow(t) {
  const tr = document.createElement('tr');
  tr.dataset.key = t.key;
  tr.className   = 'ticket-row';

  const s       = effectiveStatus(t);
  const issues  = t.issues || [];
  const blockers = issues.filter(i => i.severity === 'blocker').length;

  tr.innerHTML = `
    <td class="ticket-key"><a href="${JIRA_BASE}${t.key}" target="_blank" rel="noopener">${t.key}</a></td>
    <td class="ticket-summary">${esc(t.summary)}</td>
    <td>${statusBadge(s)}</td>
    <td class="hide-sm">${t.brief_sent ? `<span title="${fmtDate(t.brief_sent_at)}">✅ Sent</span>` : '⏳ Pending'}</td>
    <td class="hide-sm" style="text-align:center">${t.figma_check_count || 0}</td>
    <td>${qualityCell(t)}</td>
    <td class="actions">${actionsCell(t, issues, blockers)}</td>
  `;
  return tr;
}

function buildExpandRow(t) {
  const tr = document.createElement('tr');
  tr.className  = 'expand-row';
  tr.dataset.expandFor = t.key;
  const td = document.createElement('td');
  td.colSpan = 7;
  td.innerHTML  = `
    <div class="expand-panel hidden" id="issues-panel-${t.key}">
      <div class="expand-title">⚠ Quality Issues</div>
      ${buildIssuesHTML(t.issues || [])}
    </div>
  `;
  tr.appendChild(td);
  return tr;
}

function buildIssuesHTML(issues) {
  if (!issues.length) return '<div class="no-issues">✅ No issues found.</div>';
  return '<div class="issues-list">' + issues.map(i => `
    <div class="issue-item">
      <span class="badge ${severityClass(i.severity)}">${i.severity}</span>
      <div>
        <div class="issue-frame">${esc(i.frame)} · <em>${esc(i.type)}</em></div>
        <div class="issue-desc">${esc(i.description)}</div>
      </div>
    </div>
  `).join('') + '</div>';
}

function severityClass(s) {
  if (s === 'blocker') return 'badge severity-blocker';
  if (s === 'major')   return 'badge severity-major';
  return 'badge severity-minor';
}

function statusBadge(s) {
  const map = {
    'ui-design': ['badge-yellow', '🟡 UI Design'],
    'in-qa':     ['badge-blue',   '🔵 In QA'],
    'ready':     ['badge-green',  '🟢 Ready for Review'],
    'approved':  ['badge-darkgreen','✅ Approved'],
    'ignored':   ['badge-grey',   '⚫ Ignored'],
  };
  const [cls, label] = map[s] || ['badge-grey', s];
  return `<span class="badge ${cls}">${label}</span>`;
}

function qualityCell(t) {
  if (t.figma_check_count === 0) return '<span style="color:var(--text-muted)">— Not checked</span>';
  if (t.quality_passed)           return '<span style="color:var(--green)">✅ Passed</span>';
  const n = (t.issues || []).length;
  const blockers = (t.issues || []).filter(i => i.severity === 'blocker').length;
  let s = `<span style="color:var(--red)">❌ ${n} issue${n!==1?'s':''}</span>`;
  if (blockers) s += ` <span class="badge badge-red" style="font-size:.68rem">${blockers} blocker</span>`;
  return s;
}

function actionsCell(t, issues, blockers) {
  const approveActive = t.human_approved ? ' active' : '';
  const ignoreActive  = t.ignored        ? ' active' : '';
  const hasIssues     = issues.length > 0;
  const hasBrief      = !!t.brief_content;

  let btns = `
    <button class="btn btn-approve${approveActive}" onclick="toggleApprove('${t.key}')" title="Approve">
      ${t.human_approved ? '✅ Approved' : '✓ Approve'}
    </button>
    <button class="btn btn-ignore${ignoreActive}" onclick="toggleIgnore('${t.key}')" title="Ignore">
      ${t.ignored ? '⚫ Ignored' : '✕ Ignore'}
    </button>
  `;
  if (hasBrief) {
    btns += `<button class="btn btn-brief" onclick="openBrief('${t.key}')" title="View Design Brief">📄 Brief</button>`;
  }
  if (hasIssues) {
    btns += `<button class="btn btn-issues" onclick="toggleIssues('${t.key}')" title="View Issues">⚠ Issues (${issues.length})</button>`;
  }
  return btns;
}

// ═══════════════════════════════════════════════════════════════════════
//  Actions
// ═══════════════════════════════════════════════════════════════════════
function toggleApprove(key) {
  const t = allTickets[key];
  const newVal = !t.human_approved;
  if (newVal && t.ignored) { t.ignored = false; saveOverride(key, { ignored: false }); }
  t.human_approved = newVal;
  saveOverride(key, { human_approved: newVal });
  render();
  showToast(newVal ? '✅ Marked as approved' : 'Approval removed', 2500);
}

function toggleIgnore(key) {
  const t = allTickets[key];
  const newVal = !t.ignored;
  if (newVal && t.human_approved) { t.human_approved = false; saveOverride(key, { human_approved: false }); }
  t.ignored = newVal;
  saveOverride(key, { ignored: newVal });
  render();
  showToast(newVal ? '⚫ Ticket ignored' : 'Ignore removed', 2500);
}

function toggleIssues(key) {
  const panel = document.getElementById('issues-panel-' + key);
  if (!panel) return;
  const isOpen = !panel.classList.contains('hidden');
  panel.classList.toggle('hidden', isOpen);
}

// ═══════════════════════════════════════════════════════════════════════
//  Brief Modal
// ═══════════════════════════════════════════════════════════════════════
function openBrief(key) {
  const t = allTickets[key];
  if (!t) return;
  document.getElementById('modal-ticket-key').textContent   = t.key;
  document.getElementById('modal-ticket-title').textContent = t.summary;
  document.getElementById('modal-brief-body').innerHTML     = renderMarkdown(t.brief_content || '*(No brief content)*');
  document.getElementById('brief-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeBrief() {
  document.getElementById('brief-modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeBrief);
document.getElementById('brief-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeBrief();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeBrief();
});

// ═══════════════════════════════════════════════════════════════════════
//  Markdown renderer (lightweight, no deps)
// ═══════════════════════════════════════════════════════════════════════
function renderMarkdown(md) {
  const lines  = md.split('\n');
  const result = [];
  let inList   = false;
  let listType = '';  // 'ul' | 'checklist'

  function closeList() {
    if (inList) {
      result.push(`</${listType === 'checklist' ? 'ul' : listType}>`);
      inList = false; listType = '';
    }
  }

  for (let raw of lines) {
    const line = raw;

    // Headings
    if (/^### /.test(line))      { closeList(); result.push(`<h3>${inlineFormat(line.slice(4))}</h3>`); continue; }
    if (/^## /.test(line))       { closeList(); result.push(`<h2>${inlineFormat(line.slice(3))}</h2>`); continue; }
    if (/^# /.test(line))        { closeList(); result.push(`<h1>${inlineFormat(line.slice(2))}</h1>`); continue; }

    // HR
    if (/^---+$/.test(line.trim())) { closeList(); result.push('<hr>'); continue; }

    // Checklist item: - [ ] ...
    if (/^- \[[ x]\] /.test(line)) {
      if (!inList || listType !== 'checklist') { closeList(); result.push('<ul class="brief-checklist">'); inList = true; listType = 'checklist'; }
      result.push(`<li>${inlineFormat(line.slice(6).trim())}</li>`);
      continue;
    }

    // Unordered list: - item
    if (/^- /.test(line)) {
      if (!inList || listType !== 'ul') { closeList(); result.push('<ul>'); inList = true; listType = 'ul'; }
      result.push(`<li>${inlineFormat(line.slice(2))}</li>`);
      continue;
    }

    // Ordered list: 1. item
    if (/^\d+\. /.test(line)) {
      if (!inList || listType !== 'ol') { closeList(); result.push('<ol>'); inList = true; listType = 'ol'; }
      result.push(`<li>${inlineFormat(line.replace(/^\d+\. /, ''))}</li>`);
      continue;
    }

    closeList();

    if (line.trim() === '') { result.push('<p style="margin:4px 0"></p>'); continue; }

    result.push(`<p>${inlineFormat(line)}</p>`);
  }

  closeList();
  return result.join('\n');
}

function inlineFormat(s) {
  return s
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.+?)__/g,     '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,     '<em>$1</em>')
    .replace(/_(.+?)_/g,       '<em>$1</em>')
    .replace(/`(.+?)`/g,       '<code>$1</code>');
}

// ═══════════════════════════════════════════════════════════════════════
//  Filters & tabs
// ═══════════════════════════════════════════════════════════════════════
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTable();
  });
});

document.querySelectorAll('.stat-card').forEach(card => {
  card.addEventListener('click', () => {
    const f = card.dataset.filter;
    if (!f) return;
    document.querySelectorAll('.filter-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === f);
    });
    activeFilter = f;
    renderTable();
  });
});

document.getElementById('refresh-btn').addEventListener('click', () => {
  clearTimeout(refreshTimer);
  reload().then(scheduleRefresh);
  showToast('↻ Refreshing…', 1500);
});

// ═══════════════════════════════════════════════════════════════════════
//  Utilities
// ═══════════════════════════════════════════════════════════════════════
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '';
  const dt = typeof d === 'string' ? new Date(d) : d;
  if (isNaN(dt)) return String(d);
  return dt.toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

let notifTimer = null;
function showToast(msg, duration = 3000) {
  const el   = document.getElementById('notif');
  const text = document.getElementById('notif-text');
  text.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ═══════════════════════════════════════════════════════════════════════
//  Boot
// ═══════════════════════════════════════════════════════════════════════
reload().then(scheduleRefresh);
</script>
</body>
</html>
